name: Build Excel and PDF

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/**'
      - 'scripts/**'
      - '.github/workflows/build-excel.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Install LibreOffice and Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice fonts-noto-cjk

      - name: Build Excel files
        run: |
          python scripts/build_workbook.py

      - name: Build PDF files
        run: |
          chmod +x scripts/export_pdf.sh
          scripts/export_pdf.sh

      - name: Upload Excel and PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: albirex-offseason-excel-and-pdf
          path: |
            exports/*.xlsx
            exports/*.pdf
