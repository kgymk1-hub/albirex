name: Daily CSV Update

on:
  schedule:
    # 09:00 JST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Update CSV from official sites
        run: |
          python scripts/update_official_csv.py

      - name: Check CSV changes
        id: changes
        run: |
          if git diff --quiet -- data/men/players.csv data/men/official_events.csv data/ladies/players.csv data/ladies/official_events.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push CSV changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/men/players.csv data/men/official_events.csv data/ladies/players.csv data/ladies/official_events.csv
          git commit -m "Update offseason CSV from official sites"
          git push

      - name: Run Build Excel and PDF
        run: |
          gh workflow run build-excel.yml --ref main
